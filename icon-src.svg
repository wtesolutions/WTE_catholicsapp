<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#1b1626"/>
      <stop offset="60%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#050507"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFCE45"/>
      <stop offset="100%" stop-color="#F5B301"/>
    </linearGradient>
  </defs>
  <!-- full-bleed background (no transparent corners → safe as a maskable icon) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <circle cx="256" cy="238" r="150" fill="none" stroke="#FFCE45" stroke-opacity="0.22" stroke-width="9"/>
  <!-- cross, centered within the maskable safe zone -->
  <g fill="url(#gold)">
    <rect x="230" y="120" width="52" height="248" rx="15"/>
    <rect x="168" y="196" width="176" height="52" rx="15"/>
  </g>
</svg>

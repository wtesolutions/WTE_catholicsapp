<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="32%" r="85%">
      <stop offset="0%" stop-color="#17131f"/>
      <stop offset="60%" stop-color="#050507"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFCE45"/>
      <stop offset="100%" stop-color="#F5B301"/>
    </linearGradient>
  </defs>
  <!-- maskable safe zone: keep the crest within the central 80% -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <g fill="url(#gold)">
    <!-- cross (vertical + horizontal bars, centered) -->
    <rect x="228" y="120" width="56" height="272" rx="16"/>
    <rect x="160" y="196" width="192" height="56" rx="16"/>
  </g>
  <circle cx="256" cy="224" r="150" fill="none" stroke="#FFCE45" stroke-opacity="0.28" stroke-width="8"/>
</svg>
